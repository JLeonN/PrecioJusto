name: Deploy Precio Justo to GitHub Pages

on:
  # Ejecutar en cada push a master
  push:
    branches:
      - master

  # Permitir ejecución manual desde Actions tab
  workflow_dispatch:

# Permisos necesarios para GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Prevenir múltiples deploys simultáneos
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  # Job de compilación
  build:
    name: Build Quasar App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Quasar SPA
        run: npm run build
        env:
          NODE_ENV: production

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist/spa'

  # Job de despliegue
  deploy:
    name: Deploy to GitHub Pages

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
